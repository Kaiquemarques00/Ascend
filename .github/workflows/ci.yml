name: CI

on:
  push:
  pull_request:

jobs:
  api:
    name: api
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint apps/api

      - name: Build
        run: npm run build -w api

  mobile:
    name: mobile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint apps/mobile

      - name: Build
        run: npm run build -w mobile
